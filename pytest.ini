# Pytest Configuration

[pytest]
# Минимальная версия pytest
minversion = 7.0

# Тестовые папки
testpaths = tests

# Python файлы для поиска тестов
python_files = test_*.py

# Классы для поиска тестов
python_classes = Test*

# Функции для поиска тестов
python_functions = test_*

# Минимум всегда показываем
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers для категоризации тестов
markers =
    unit: Unit tests
    integration: Integration tests
    edge_cases: Edge case tests
    slow: Slow tests
    requires_network: Tests that require network access
    mocked: Tests using mocks
    utils: Tests for utils module
    api: Tests for API module
    storage: Tests for storage module
    operations: Tests for operations module
    main: Tests for main module

# Coverage конфигурация
[coverage:run]
source = src/hh_applicant_tool
omit =
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @property

# Минимум покрытия
fail_under = 70

[coverage:html]
directory = htmlcov
